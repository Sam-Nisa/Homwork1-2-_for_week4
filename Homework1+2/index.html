<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Practice Webpage</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./images/favicon.png">


    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header  -->
    <header class="page-header">
        <h1 class="page-title">Student Practice Webpage</h1>
        <p class="page-subtitle">
            HTML + CSS Practice (Forms + Table Advanced)
        </p>
    </header>

    <!-- Image Section -->
    <section class="card-section">
        <h2 class="section-title">Image Section</h2>

        <div class="image-wrapper">
            <img src="images/nature.png" alt="Nature" class="image-rectangle">
        </div>
    </section>

    <!-- Circle Image -->
    <section class="card-section">
        <h2 class="section-title">Image Circle</h2>

        <div class="image-wrapper">
            <img src="images/nature.png" alt="Nature Circle" class="image-circle">
        </div>
    </section>

    <!-- Oval Image -->
    <section class="card-section">
        <h2 class="section-title">Image Oval</h2>

        <div class="image-wrapper">
            <img src="images/nature.png" alt="Nature Oval" class="image-oval">
        </div>
    </section>

    <!-- Table Section -->
    <section class="card-section">
        <h2 class="section-title">Advanced Table</h2>

        <table class="student-table">

            <thead>
                <tr>
                    <th rowspan="2">Name</th>
                    <th colspan="2">Scores</th>
                    <th rowspan="2">Grade</th>
                </tr>

                <tr>
                    <th>Math</th>
                    <th>CS</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Alice</td>
                    <td>90</td>
                    <td>95</td>
                    <td>A</td>
                </tr>

                <tr>
                    <td>Bob</td>
                    <td>80</td>
                    <td>85</td>
                    <td>B</td>
                </tr>
            </tbody>

        </table>
    </section>

    <!-- Form 1 -->
    <section class="card-section form-section">

        <div class="form-container">

            <h2 class="section-title">Form 1: Basic Info</h2>

            <form>

                <div class="form-group">
                    <label>Name <span>*</span></label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                    <label>Email <span>*</span></label>
                    <input type="email" required>
                </div>

                <div class="form-group">
                    <label>Password <span>*</span></label>
                    <input type="password" required>
                </div>

                <div class="form-group">
                    <label>Upload File</label>
                    <input type="file">
                </div>

                <div class="button-group">
                    <button type="submit">Submit</button>
                    <button type="reset">Reset</button>
                </div>

            </form>

        </div>

    </section>

    <!-- Form 2 -->
    <section class="card-section form-section">

        <div class="form-container">

            <h2 class="section-title">Form 2: Survey Form</h2>

            <form>

                <div class="form-group">
                    <label>Choose Course <span>*</span></label>

                    <select>
                        <option>-- Select --</option>
                        <option>HTML</option>
                        <option>CSS</option>
                        <option>JavaScript</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Gender</label>

                    <div class="option-group">
                        <label><input type="radio" name="gender"> Male</label>
                        <label><input type="radio" name="gender"> Female</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Skills</label>

                    <div class="option-group">
                        <label><input type="checkbox"> HTML</label>
                        <label><input type="checkbox"> CSS</label>
                        <label><input type="checkbox"> JS</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone <span>*</span></label>
                    <input type="tel">
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5"></textarea>
                </div>

                <button type="submit">Send</button>

            </form>

        </div>

    </section>

</body>

</html>
